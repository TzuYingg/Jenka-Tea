<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>庄腳・煮茶</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#F6F3ED;--card:#FCFAF6;--surface:#FCFAF6;--ink:#2B2824;--ink2:#6B665C;--ink3:#9C978C;--border:#E7E2D8;--tint:#F0ECE3;--neutral:#D8D2C6;--ok:#5F8268;--ok-soft:#E9EFE9;--warn:#B6863C;--warn-soft:#F6EEDD;--danger:#A2503C;--danger-soft:#F3E3DC;--accent:#2E6E64;--accent-soft:#E3EEEB;--navh:58px;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--cream);color:var(--ink);font-family:"Noto Sans TC",sans-serif;-webkit-font-smoothing:antialiased}
.mono{font-family:"Noto Sans TC",sans-serif}
.mono,.htot,.resn,.bvol,.val,.sv,.tm,.hbreak .pot,.card .meta b{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.wrap{max-width:480px;margin:0 auto;padding:18px 20px;padding-bottom:calc(var(--navh) + env(safe-area-inset-bottom) + 24px)}
.head{margin-bottom:6px;display:flex;align-items:center;gap:8px}
.title{font-size:20px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.title .leaf{width:9px;height:9px;border-radius:50%;background:var(--accent)}
.cloud{margin-left:auto;font-size:10.5px;font-weight:600;color:var(--ink3);display:flex;align-items:center;gap:5px}
.cloud .cd{width:7px;height:7px;border-radius:50%;background:var(--neutral)}
.cloud.online .cd{background:var(--ok)} .cloud.offline .cd{background:var(--warn)}
.sub{font-size:12px;color:var(--ink3);margin:2px 0 16px}
.ctxseg{display:flex;background:var(--tint);border-radius:12px;padding:3px;margin-bottom:12px}
.ctxseg button{flex:1;border:0;background:transparent;color:var(--ink2);font-family:inherit;font-size:13px;font-weight:600;padding:11px 0;border-radius:10px;cursor:pointer;line-height:1.3}
.ctxseg button small{display:block;font-size:10px;font-weight:500;color:var(--ink3);margin-top:2px}
.ctxseg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(43,40,36,.12)} .ctxseg button.on small{color:var(--ink2)}
.daybar{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 13px;margin-bottom:14px;box-shadow:0 1px 3px rgba(43,40,36,.06);display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink2)}
.daybar .d{font-weight:600;color:var(--ink)}
.mini{display:flex;background:var(--tint);border-radius:14px;padding:2px;margin-left:auto}
.mini button{border:0;background:transparent;color:var(--ink3);font-family:inherit;font-size:11px;font-weight:600;padding:5px 11px;border-radius:12px;cursor:pointer}
.mini button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(43,40,36,.12)}
.handover{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:6px 16px 14px;box-shadow:0 1px 3px rgba(43,40,36,.07);margin-bottom:16px}
.handover .label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink3);padding:13px 0 4px}
.hrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.hrow:last-of-type{border-bottom:0}
.hrow .hl{min-width:0}
.hrow .htn{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px}
.hrow .htn .cd{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none}
.hrow.off .htn .cd{background:var(--neutral)}
.hrow .hpot{display:flex;align-items:center;gap:9px;margin-top:7px}
.hrow .hpot .pb{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:8px;padding:3px 9px 3px 7px;flex:none;display:inline-flex;align-items:center}
.hrow .hpot .pb .ic{width:13px;height:13px;margin-right:3px;vertical-align:0}
.hrow .hpot .pvol{font-size:15px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.hrow .hpot .pnone{font-size:12.5px;font-weight:600;color:var(--warn);background:var(--warn-soft);border-radius:8px;padding:3px 9px}
.hrow .hpot.single{margin-top:6px}
.hrow .htag{background:var(--accent-soft);border-radius:8px;padding:3px 9px;font-size:12.5px;color:var(--accent);font-weight:600}
.hrow .htot{margin-left:auto;font-family:"Noto Sans TC",monospace;font-size:21px;font-weight:500;color:var(--accent);white-space:nowrap;line-height:1}
.hrow .htot span{font-size:11px;color:var(--ink3);margin-left:3px}
.hrow.off .htot{color:var(--ink3);font-size:14px;font-weight:600}
.handover .copy{margin-top:13px;width:100%;background:var(--ink);border:0;color:#fff;font-family:inherit;font-size:13px;font-weight:600;padding:11px 0;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.sect{font-size:11px;font-weight:700;letter-spacing:1.4px;color:var(--ink3);margin:18px 2px 9px;display:flex;align-items:center;gap:7px}
.sect .dot{width:7px;height:7px;border-radius:50%;background:var(--neutral)}
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px 15px;box-shadow:0 1px 3px rgba(43,40,36,.07);margin-bottom:9px}
.card .top{display:flex;align-items:flex-start;gap:10px}
.card .sdot{width:9px;height:9px;border-radius:50%;background:var(--neutral);margin-top:5px;flex:none}
.card.ok .sdot{background:var(--ok)}
.card .name{font-size:15px;font-weight:600} .card .meta{font-size:11px;color:var(--ink3);margin-top:3px} .card .meta b{color:var(--ink2);font-family:"Noto Sans TC",monospace;font-weight:500}
.card .right{margin-left:auto;text-align:right;flex:none;padding-left:8px}
.card .res{font-size:11px;color:var(--ink3);font-weight:600} .card.ok .res{color:var(--ok)}
.card .resn{font-family:"Noto Sans TC",monospace;font-size:16px;font-weight:500;color:var(--accent)}
.card .ing{display:flex;flex-wrap:wrap;gap:6px}
.card .ing span.cup{background:var(--accent-soft);color:var(--accent);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600} .card .ing span.cup b{font-family:"Noto Sans TC",monospace;color:var(--accent);font-weight:500}
.step{display:flex;align-items:center;gap:10px;margin-top:11px}
.step .lab{font-size:12px;color:var(--ink2);font-weight:500}
.step .ctrl{margin-left:auto;display:flex;align-items:center;gap:8px}
.step button{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--ink);font-size:19px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.step button:active{background:var(--tint)}
.step .val{width:64px;text-align:center;font-family:"Noto Sans TC",monospace;font-size:16px;font-weight:500;color:var(--ink);border:1px solid var(--border);border-radius:9px;background:var(--surface);padding:6px 0}
.step .val:focus{outline:0;border-color:var(--accent)}
.step .vu{font-size:12px;color:var(--ink3);min-width:14px}
/* 煮茶大卡（每鍋一張） */
.brew{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 16px;box-shadow:0 1px 3px rgba(43,40,36,.07);margin-bottom:11px}
.brew .bh{display:flex;align-items:baseline;gap:8px}
.brew .bname{font-size:17px;font-weight:700}
.brew .bpot{font-size:11px;color:var(--accent);background:var(--accent-soft);border-radius:9px;padding:2px 8px 2px 6px;font-weight:600;display:inline-flex;align-items:center}
.brew .bpot .ic{width:13px;height:13px;margin-right:3px;vertical-align:0}
.brew .bvol{margin-left:auto;font-family:"Noto Sans TC",monospace;font-size:22px;font-weight:500;color:var(--accent)} .brew .bvol small{font-size:12px;color:var(--ink3)}
.brew .bsplit{font-size:14px;color:var(--ink);font-weight:600;margin-top:9px}
.brew .bsplit .sn{color:var(--warn);font-weight:700} .brew .bsplit .sh{color:var(--accent);font-weight:700}
.brew .recipe{margin-top:12px;border:1px solid var(--border);border-radius:11px;overflow:hidden}
.brew .rr{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface)}
.brew .rr + .rr{border-top:1px solid var(--border)}
.brew .rr .rv{font-size:12px;font-weight:600;color:var(--ink2);background:var(--tint);border-radius:7px;padding:3px 8px;flex:none;font-variant-numeric:tabular-nums}
.brew .rr .rv.sugar{background:var(--warn-soft);color:var(--warn)}
.brew .rr .rn{font-size:13.5px;font-weight:600;color:var(--ink);display:inline-flex;align-items:center}
.brew .rr .rn .ic{color:var(--ink2)}
.brew .rr .rg{margin-left:auto;font-size:18px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums} .brew .rr .rg small{font-size:12px;color:var(--ink3);font-weight:500;margin-left:1px}
.brew .rr .rg.sugar{color:var(--warn)}
.ic{width:15px;height:15px;flex:none;vertical-align:-2px;margin-right:5px}
.roundseg{display:flex;background:var(--tint);border-radius:12px;padding:3px;margin-bottom:7px}
.roundseg button{flex:1;border:0;background:transparent;color:var(--ink2);font-family:inherit;font-size:14px;font-weight:600;padding:10px 0;border-radius:10px;cursor:pointer;line-height:1.25}
.roundseg button small{display:block;font-size:10.5px;font-weight:500;color:var(--ink3);margin-top:2px}
.roundseg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(43,40,36,.12)} .roundseg button.on small{color:var(--accent)}
.roundhint{font-size:11.5px;color:var(--ink3);margin:0 2px 13px;display:flex;align-items:center}
.roundhint .ic{color:var(--accent)}
.brew .timers{display:flex;gap:10px;margin-top:13px;padding-top:13px;border-top:1px solid var(--border)}
.phase{flex:1;display:flex;flex-direction:column;gap:7px}
.pbtn{display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--border);background:var(--surface);color:var(--ink);font-family:inherit;font-size:14px;font-weight:600;padding:11px 0;border-radius:10px;cursor:pointer}
.pbtn.done{background:var(--ok-soft);border-color:#CFE0CF;color:var(--ok)}
.ck{width:18px;height:18px;border:1.6px solid var(--ink3);border-radius:5px;display:inline-flex;align-items:center;justify-content:center;flex:none;box-sizing:border-box}
.pbtn.done .ck{border-color:var(--ok);background:var(--ok)}
.ck i{width:4px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px;display:block}
.tmbtn{border:1px solid var(--border);background:var(--surface);color:var(--ink2);font-family:inherit;font-size:13px;font-weight:600;padding:9px 0;border-radius:9px;cursor:pointer}
.tmbtn.run{background:var(--accent);color:#fff;border-color:var(--accent)}
.tmbtn.run.rest{background:var(--warn);border-color:var(--warn)}
.tmbtn .tm{font-variant-numeric:tabular-nums;font-size:15px}
.bigbtn{width:100%;margin-top:18px;background:var(--ink);border:0;color:#fff;font-family:inherit;font-size:15px;font-weight:600;padding:15px 0;border-radius:12px;cursor:pointer}
.ghost{width:100%;margin-top:10px;background:var(--surface);border:1px solid var(--border);color:var(--ink2);font-family:inherit;font-size:13px;font-weight:600;padding:12px 0;border-radius:11px;cursor:pointer}
.msg{font-size:12px;font-weight:600;text-align:center;margin-top:10px}
.empty{text-align:center;color:var(--ink3);font-size:13px;line-height:1.7;padding:30px 10px}
.lockbox{display:flex;gap:8px;margin:6px 0 4px}
.lockbox input{flex:1;border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:13px;background:var(--surface)} .lockbox input:focus{outline:0;border-color:var(--accent)}
.lockbox button{border:0;background:var(--ink);color:#fff;font-family:inherit;font-size:13px;font-weight:600;padding:0 16px;border-radius:9px;cursor:pointer}
.srow{padding:11px 0;border-bottom:1px solid var(--border)} .srow:last-of-type{border-bottom:0}
.srow .an{font-size:13px;font-weight:600;margin-bottom:7px}
.sfields{display:flex;flex-wrap:wrap;gap:7px}
.sfield{display:flex;align-items:center;gap:5px;background:var(--tint);border-radius:9px;padding:4px 7px}
.sfield .sl{font-size:10.5px;color:var(--ink3);font-weight:600} .sfield.cup .sl{color:var(--accent)}
.sfield button{width:24px;height:24px;border-radius:7px;border:1px solid var(--border);background:#fff;color:var(--ink);font-size:14px;cursor:pointer}
.sfield .sv{min-width:34px;text-align:center;font-family:"Noto Sans TC",monospace;font-size:12px;font-weight:500}
.note{font-size:11px;color:var(--ink3);line-height:1.7;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.nav{position:fixed;left:0;right:0;bottom:0;height:calc(var(--navh) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(252,250,246,.96);backdrop-filter:blur(8px);border-top:1px solid var(--border);display:flex;z-index:50}
.nav button{flex:1;border:0;background:transparent;font-family:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--ink3);font-size:11px;font-weight:600}
.nav button .ni{width:20px;height:20px;border-radius:6px;border:2px solid currentColor;opacity:.55}
.nav button.on{color:var(--accent)} .nav button.on .ni{opacity:1;background:var(--accent-soft)}
</style>
</head>
<body>
<div class="wrap" id="content"></div>
<div class="nav" id="nav">
  <button data-pg="brew"><span class="ni"></span>煮茶</button>
  <button data-pg="plan"><span class="ni"></span>盤點算量</button>
  <button data-pg="set"><span class="ni"></span>設定</button>
</div>

<script>
/* ════ 設定區 ════ 單位＝ml；potCc 用來把盤點的「壺」換算 ════ */
var TEAS=[
  {group:'紅茶', id:'b_half', name:'紅茶 半糖', potCc:4000, wk:20000, wkd:20000, hasCup:true,  seal:12, seg:[2,1,2]},
  {group:'紅茶', id:'b_none', name:'紅茶 無糖', potCc:2000, wk:4000,  wkd:4000,  hasCup:false, seal:0,  seg:[2,1,2]},
  {group:'濃茶', id:'s_half', name:'濃茶 半糖', potCc:4000, wk:7000,  wkd:7000,  hasCup:false, seal:0,  seg:[2,1,2]},
  {group:'濃茶', id:'s_none', name:'濃茶 無糖', potCc:2000, wk:2000,  wkd:2000,  hasCup:false, seal:0,  seg:[2,1,2]},
  {group:'奶茶', id:'milk',   name:'奶茶',      potCc:4000, wk:8000,  wkd:8000,  hasCup:true,  seal:6,  seg:[2,1,2]},
];
/* 配方：每 1000ml 所需克數；steep/rest 分鐘 */
var BASES=[
  {id:'black', name:'紅茶', steep:10, rest:10, sugarPer1000:71, ing:[{n:'茶葉(經典)', per1000:20}], half:'b_half', none:'b_none'},
  {id:'strong', name:'濃茶', steep:10, rest:10, sugarPer1000:70, ing:[{n:'茶葉(經典)', per1000:32.5}], half:'s_half', none:'s_none'},
  {id:'milk', name:'奶茶', steep:20, rest:10, sugarPer1000:49, ing:[{n:'茶葉(經典)', per1000:6},{n:'茶葉(PA)', per1000:20.5},{n:'奶精', per1000:120}], single:'milk'},
];
var MAX_BUCKET=14000;   // 桶子上限(ml)，超過自動分鍋
var DB='https://jenka-inventory-default-rtdb.asia-southeast1.firebasedatabase.app';
var CFG_URL=DB+'/jenkaTea/config.json', PLAN_URL=DB+'/jenkaTea/plan.json', ADMIN_PW='jenka@kaka';

var st={page:'brew', ctx:'tomorrow', day:'weekday', round:0, pot:{}, cup:{}, unlocked:false};
var tot={}, sealOv={}, segOv={}, cloud='connecting', planMeta=null, planAmt=null, planMsg='', saveMsg='', saveOk=true, lockMsg='';
var timers={}, phaseDone={};
/* 線條風圖示（stroke=currentColor，跟著文字顏色，極簡不搶風格） */
var IC={
  leaf:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19C5 11 11 5 19 5c0 8-6 14-14 14Z"/><path d="M5 19 13 11"/></svg>',
  cup:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h12l-1.4 12.2A2 2 0 0 1 14.6 20H9.4a2 2 0 0 1-2-1.8Z"/><path d="M7 11h10"/></svg>',
  cube:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2.5"/><path d="M9.5 10.5h5M9.5 13.5h3"/></svg>',
  bucket:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8h14l-1.4 10.2A1 1 0 0 1 16.6 19H7.4a1 1 0 0 1-1-.8Z"/><path d="M4 8h16"/><path d="M8.5 5.2a3.7 3.7 0 0 1 7 0"/></svg>'
};
function matIcon(n){ if(n.indexOf('茶葉')>=0)return IC.leaf; if(n.indexOf('奶精')>=0)return IC.cup; if(n.indexOf('糖')>=0)return IC.cube; return ''; }
TEAS.forEach(function(t){ st.pot[t.id]=0; st.cup[t.id]=0; tot[t.id]={wk:t.wk,wkd:t.wkd}; sealOv[t.id]=t.seal; segOv[t.id]=t.seg.slice(); });
function byId(id){ return TEAS.find(function(x){return x.id===id;}); }

function num(n){ return (Math.round(n)).toLocaleString(); }
function fmt1(n){ return (n%1===0)?String(n):n.toFixed(1); }
function dayTotal(t,day){ return day==='weekend'?tot[t.id].wkd:tot[t.id].wk; }
function remainMl(t){ return (st.pot[t.id]||0)*t.potCc + (t.hasCup?(st.cup[t.id]||0)*500:0); }
function tailRatio(t){ var w=segOv[t.id], s=w[0]+w[1]+w[2]; return s<=0?0:(w[1]+w[2])/s; }
function itemDue(t){
  var total, ratio;
  if(st.ctx==='tomorrow'){ total=dayTotal(t,st.day); ratio=1; }
  else { total=dayTotal(t,st.day); ratio=tailRatio(t); }
  var due=total*ratio - remainMl(t); if(due<0)due=0;
  return Math.round(due/500)*500;
}
function buckets(total){ var out=[]; while(total>0){ var b=Math.min(total,MAX_BUCKET); out.push(b); total-=b; } return out; }

/* 把一種茶的該煮量拆成鍋（含無糖/半糖分配，無糖優先放前面的鍋） */
function brewBatches(b, amt){
  var none=b.none?(amt[b.none]||0):0, half=b.half?(amt[b.half]||0):0, single=b.single?(amt[b.single]||0):0;
  var total=b.single?single:(half+none);
  if(total<=0) return [];
  var bs=buckets(total), rem=none, out=[];
  bs.forEach(function(v,i){
    var bn=b.single?0:Math.min(rem,v); rem-=bn; var bh=v-bn;
    var ing=b.ing.map(function(x){ return {n:x.n, g:Math.round(v/1000*x.per1000)}; });
    var sugarBase=b.single?v:bh;
    out.push({idx:i, vol:v, none:bn, half:bh, ing:ing, sugarG:Math.round(sugarBase/1000*b.sugarPer1000), single:b.single, n:bs.length});
  });
  return out;
}
function handoverData(b, amt){
  var none=b.none?(amt[b.none]||0):0, half=b.half?(amt[b.half]||0):0, single=b.single?(amt[b.single]||0):0;
  var total=b.single?single:(half+none);
  if(total<=0) return {name:b.name, off:true};
  var bs=buckets(total), rem=none, batches=[];
  bs.forEach(function(v){ var bn=Math.min(rem,v); rem-=bn; batches.push({vol:v, none:bn}); });
  return {name:b.name, off:false, total:total, none:none, batches:batches};
}
function handoverText(b, amt){
  var d=handoverData(b,amt);
  if(d.off) return d.name+' 免煮';
  var parts=d.batches.map(function(bt){ return Math.round(bt.vol)+(bt.none>0?'（'+Math.round(bt.none)+'無糖）':''); });
  return d.name+' '+parts.join('＋');
}

function dateInfo(o){ var d=new Date(); d.setDate(d.getDate()+o); var wd=['日','一','二','三','四','五','六'][d.getDay()];
  return {m:d.getMonth()+1, day:d.getDate(), wd:wd, weekend:(d.getDay()===0||d.getDay()===6)}; }
function hhmm(ts){ var d=new Date(ts); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }
function mmss(s){ s=Math.max(0,s); return Math.floor(s/60)+':'+('0'+(s%60)).slice(-2); }

/* ── 計時：每鍋兩顆獨立按鈕（悶/醒），互不影響 ── */
function beep(){ try{ var a=new (window.AudioContext||window.webkitAudioContext)(); var o=a.createOscillator(),g=a.createGain(); o.connect(g); g.connect(a.destination); o.frequency.value=880; g.gain.setValueAtTime(.35,a.currentTime); g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.7); o.start(); o.stop(a.currentTime+.7);}catch(e){} }
function tkey(card,phase){ return card+':'+phase; }
function elid(k){ return 'tm-'+k.replace(':','-'); }
function paintT(k){ var t=timers[k], el=document.getElementById(elid(k)); if(el&&t) el.textContent=mmss(t.remain); }
function tickT(k){ var t=timers[k]; if(!t)return; t.remain--; if(t.remain<=0){ beep(); clearInterval(t.iv); delete timers[k]; phaseDone[k]=true; render(); } else paintT(k); }
function startT(card,phase,mins){ var k=tkey(card,phase); if(timers[k]&&timers[k].iv)clearInterval(timers[k].iv);
  phaseDone[k]=false; timers[k]={remain:mins*60,iv:null}; timers[k].iv=setInterval(function(){tickT(k);},1000); beep(); render(); }
function stopT(k){ if(timers[k]){ if(timers[k].iv)clearInterval(timers[k].iv); delete timers[k]; } render(); }
function toggleDone(k){ phaseDone[k]=!phaseDone[k]; render(); }

/* ── 雲端 ── */
function loadConfig(){ cloud='connecting'; render();
  var ctl=new AbortController(), to=setTimeout(function(){ctl.abort();},6000);
  fetch(CFG_URL,{signal:ctl.signal}).then(function(r){ clearTimeout(to); if(!r.ok)throw 0; return r.json(); })
  .then(function(d){ if(d&&d.tot){ TEAS.forEach(function(t){ if(d.tot[t.id]){ tot[t.id]={wk:+d.tot[t.id].wk, wkd:+d.tot[t.id].wkd}; } }); }
    if(d&&d.seal){ TEAS.forEach(function(t){ if(d.seal[t.id]!=null) sealOv[t.id]=+d.seal[t.id]; }); }
    if(d&&d.seg){ TEAS.forEach(function(t){ var s=d.seg[t.id]; if(s&&s.length===3) segOv[t.id]=[+s[0],+s[1],+s[2]]; }); }
    cloud='online'; render(); })
  .catch(function(){ clearTimeout(to); cloud='offline'; render(); }); }
function saveConfig(){ var to={}, sl={}, sg={}; TEAS.forEach(function(t){ to[t.id]=tot[t.id]; sl[t.id]=sealOv[t.id]; sg[t.id]=segOv[t.id]; });
  saveMsg='儲存中…'; saveOk=true; render();
  fetch(CFG_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({tot:to,seal:sl,seg:sg,updatedAt:Date.now()})})
  .then(function(r){ if(!r.ok)throw 0; cloud='online'; saveMsg='✓ 已存到雲端'; render(); })
  .catch(function(){ saveMsg='✕ 儲存失敗（資料庫權限？）'; saveOk=false; render(); }); }
function submitPlan(){ var plan={}; TEAS.forEach(function(t){ plan[t.id]=itemDue(t); });
  var body={plan:plan, ctx:st.ctx, day:st.day, dlabel:(st.ctx==='tomorrow'?dateInfo(1):dateInfo(0)).m+'/'+(st.ctx==='tomorrow'?dateInfo(1):dateInfo(0)).day, at:Date.now()};
  planMsg='送出中…'; render();
  fetch(PLAN_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
  .then(function(r){ if(!r.ok)throw 0; planMeta=body; planAmt=plan; planMsg='✓ 已送出，煮茶頁即可看到'; render(); })
  .catch(function(){ planMsg='✕ 送出失敗（連線或權限）'; render(); }); }
function loadPlan(silent){ if(!silent){planMsg='讀取中…'; render();}
  fetch(PLAN_URL).then(function(r){ if(!r.ok)throw 0; return r.json(); }).then(function(d){
    if(d&&d.plan){ planMeta=d; planAmt=d.plan; if(!silent)planMsg='已載入 '+hhmm(d.at); }
    else if(!silent)planMsg='雲端尚無資料';
    render();
  }).catch(function(){ if(!silent){planMsg='讀取失敗'; render();} }); }

function go(pg){ st.page=pg; if(pg==='brew')loadPlan(true); render(); }
function setCtx(c){ st.ctx=c; var di=(c==='tomorrow')?dateInfo(1):dateInfo(0); st.day=di.weekend?'weekend':'weekday'; render(); }
function setDay(v){ st.day=v; render(); }
function unlock(){ var v=document.getElementById('pwIn').value; if(v===ADMIN_PW){st.unlocked=true;lockMsg='';}else{lockMsg='密碼不對';} render(); }
function bumpPot(id,dir){ var v=(st.pot[id]||0)+dir*0.5; if(v<0)v=0; st.pot[id]=Math.round(v*10)/10; render(); }
function setPot(id,val){ var v=parseFloat(val); st.pot[id]=(isNaN(v)||v<0)?0:Math.round(v*10)/10; render(); }
function bumpCup(id,dir){ var v=(st.cup[id]||0)+dir; if(v<0)v=0; st.cup[id]=v; render(); }
function setCup(id,val){ var v=parseInt(val,10); st.cup[id]=(isNaN(v)||v<0)?0:v; render(); }
function bumpTot(id,k,dir){ var v=tot[id][k]+dir*500; if(v<0)v=0; tot[id][k]=v; saveMsg=''; render(); }
function bumpSeal(id,dir){ var v=sealOv[id]+dir; if(v<0)v=0; sealOv[id]=v; saveMsg=''; render(); }
function bumpSeg(id,i,dir){ var v=segOv[id][i]+dir; if(v<0)v=0; segOv[id][i]=v; saveMsg=''; render(); }
function copyHandover(){ var amt={}; TEAS.forEach(function(t){amt[t.id]=itemDue(t);}); var lines=BASES.map(function(b){ return handoverText(b,amt); });
  var txt=lines.join('\n'); try{ navigator.clipboard.writeText(txt); planMsg='✓ 已複製交接訊息'; }catch(e){ planMsg='請手動長按複製'; } render(); }

function cloudHTML(){ return '<div class="cloud '+cloud+'"><span class="cd"></span>'+(cloud==='online'?'雲端已連線':cloud==='offline'?'雲端未連線':'連線中')+'</div>'; }

/* ── 煮茶頁（執行：分鍋＋雙計時） ── */
function pageBrew(){
  var h='<div class="head"><div class="title"><span class="leaf"></span>今日煮茶</div>'+cloudHTML()+'</div>';
  var t0=dateInfo(0);
  h+='<div class="sub">'+t0.m+'/'+t0.day+'（週'+t0.wd+'）'+(planMeta?'　・依 '+hhmm(planMeta.at)+'（'+(planMeta.ctx==='today'?'補今天':'備明天')+'）':'')+'</div>';
  if(!planAmt){ h+='<div class="empty">尚無要煮的資料。<br>請到「盤點算量」盤點並送出，這裡就會列出要煮什麼。<br><br><button class="ghost" onclick="loadPlan(false)">重新讀取雲端</button></div>'; return h; }
  var perBase=[];
  BASES.forEach(function(b){ var bs=brewBatches(b, planAmt); if(bs.length) perBase.push({b:b, batches:bs}); });
  if(perBase.length===0){ h+='<div class="empty">這次不需煮茶（量都已足）。</div>'; return h; }
  var maxR=0; perBase.forEach(function(x){ if(x.batches.length>maxR)maxR=x.batches.length; });
  if(st.round>=maxR) st.round=0;
  if(maxR>1){
    h+='<div class="roundseg">';
    for(var r=0;r<maxR;r++){ var cnt=perBase.filter(function(x){return x.batches[r];}).length;
      h+='<button class="'+(st.round===r?'on':'')+'" onclick="setRound('+r+')">第 '+(r+1)+' 鍋<small>'+cnt+' 種</small></button>'; }
    h+='</div><div class="roundhint">'+IC.bucket+'先把「第 1 鍋」三種都煮完，再切到下一鍋回頭煮。</div>';
  }
  var shown=0;
  perBase.forEach(function(x){ var bt=x.batches[st.round]; if(bt){ h+=brewCard(x.b, bt); shown++; } });
  if(shown===0) h+='<div class="empty">這一鍋沒有要煮的。</div>';
  return h;
}
function setRound(r){ st.round=r; render(); }
function brewCard(b,bt){
  var card=b.id+'_'+bt.idx;
  var pot=bt.n>1?'<span class="bpot">'+IC.bucket+'共 '+bt.n+' 鍋</span>':'';
  /* 分糖：凸顯 */
  var split='';
  if(!b.single && bt.none>0){
    split='<div class="bsplit">分糖：<span class="sn">無糖 '+num(bt.none)+'</span> ＋ <span class="sh">半糖 '+num(bt.half)+'</span> ml</div>';
  } else if(!b.single){
    split='<div class="bsplit">全鍋 <span class="sh">半糖 '+num(bt.half)+'</span> ml</div>';
  }
  /* 配方：每列前面標清楚是「幾 ml 的比例」，材料前加線條圖示 */
  var rows='';
  bt.ing.forEach(function(x){ rows+='<div class="rr"><span class="rv">整鍋 '+num(bt.vol)+' ml</span><span class="rn">'+matIcon(x.n)+x.n+'</span><span class="rg">'+x.g+'<small>g</small></span></div>'; });
  if(bt.sugarG>0){ var sbase=b.single?bt.vol:bt.half; rows+='<div class="rr"><span class="rv sugar">'+(b.single?'整鍋 ':'半糖 ')+num(sbase)+' ml</span><span class="rn">'+IC.cube+'加糖</span><span class="rg sugar">'+bt.sugarG+'<small>g</small></span></div>'; }
  return '<div class="brew"><div class="bh"><span class="bname">'+b.name+'</span>'+pot+'<span class="bvol">'+num(bt.vol)+'<small> ml</small></span></div>'+split+
    '<div class="recipe">'+rows+'</div>'+
    '<div class="timers">'+phaseCtl(card,'steep',b.steep,'悶茶')+phaseCtl(card,'rest',b.rest,'醒茶')+'</div></div>';
}
function phaseCtl(card,phase,mins,label){
  var k=tkey(card,phase), t=timers[k], done=!!phaseDone[k];
  var chk='<span class="ck'+(done?' on':'')+'">'+(done?'<i></i>':'')+'</span>';
  var doneBtn='<button class="pbtn'+(done?' done':'')+'" onclick="toggleDone(\''+k+'\')">'+chk+label+'</button>';
  var tim;
  if(t) tim='<button class="tmbtn run '+phase+'" onclick="stopT(\''+k+'\')">⏱ <span class="tm" id="'+elid(k)+'">'+mmss(t.remain)+'</span></button>';
  else tim='<button class="tmbtn '+phase+'" onclick="startT(\''+card+'\',\''+phase+'\','+mins+')">⏱ '+mins+'分</button>';
  return '<div class="phase">'+doneBtn+tim+'</div>';
}

/* ── 盤點算量頁（情境：備明天／補今天） ── */
function pagePlan(){
  var h='<div class="head"><div class="title"><span class="leaf"></span>盤點算量</div>'+cloudHTML()+'</div>';
  h+='<div class="sub">盤點現有量，算出每種茶要煮多少</div>';
  h+='<div class="ctxseg"><button class="'+(st.ctx==='tomorrow'?'on':'')+'" onclick="setCtx(\'tomorrow\')">收班・備明天<small>明天整天的量</small></button>'+
     '<button class="'+(st.ctx==='today'?'on':'')+'" onclick="setCtx(\'today\')">離峰・補今天<small>今天剩下要補的量</small></button></div>';
  var di=(st.ctx==='tomorrow')?dateInfo(1):dateInfo(0);
  h+='<div class="daybar"><span>'+(st.ctx==='tomorrow'?'明天':'今天')+'</span><span class="d">'+di.m+'/'+di.day+'（週'+di.wd+'）</span>'+
     '<div class="mini"><button class="'+(st.day==='weekday'?'on':'')+'" onclick="setDay(\'weekday\')">平日</button><button class="'+(st.day==='weekend'?'on':'')+'" onclick="setDay(\'weekend\')">假日</button></div></div>';
  /* 交接格式總覽（Rei 重做） */
  var amt={}; TEAS.forEach(function(t){ amt[t.id]=itemDue(t); });
  h+='<div class="handover"><div class="label">'+(st.ctx==='tomorrow'?'明天要煮（交接）':'現在要補煮')+'</div>';
  BASES.forEach(function(b){
    var d=handoverData(b,amt);
    if(d.off){ h+='<div class="hrow off"><div class="hl"><div class="htn"><span class="cd"></span>'+b.name+'</div></div><div class="htot">免煮</div></div>'; return; }
    var sub='';
    if(d.batches.length>1){
      d.batches.forEach(function(bt,i){
        sub+='<div class="hpot"><span class="pb">'+IC.bucket+'鍋'+(i+1)+'</span><span class="pvol">'+num(bt.vol)+'</span>'+(bt.none>0?'<span class="pnone">含無糖 '+num(bt.none)+'</span>':'')+'</div>';
      });
    } else if(d.none>0){
      sub='<div class="hpot single"><span class="pnone">含無糖 '+num(d.none)+'</span></div>';
    }
    h+='<div class="hrow"><div class="hl"><div class="htn"><span class="cd"></span>'+b.name+'</div>'+sub+'</div>'+
       '<div class="htot">'+num(d.total)+'<span>ml</span></div></div>';
  });
  h+='<button class="copy" onclick="copyHandover()">⧉ 複製交接訊息</button></div>';
  /* 盤點輸入 */
  var lastG='';
  TEAS.forEach(function(t){ if(t.group!==lastG){ h+='<div class="sect"><span class="dot"></span>'+t.group+'</div>'; lastG=t.group; } h+=planCard(t); });
  h+='<button class="bigbtn" onclick="submitPlan()">送出（給煮茶頁）</button>';
  h+='<button class="ghost" onclick="loadPlan(false)">載入最新（老闆遠端查看）</button>';
  if(planMsg) h+='<div class="msg" style="color:'+(planMsg.indexOf('✕')>=0||planMsg.indexOf('失敗')>=0?'var(--danger)':'var(--ok)')+'">'+planMsg+'</div>';
  return h;
}
function planCard(t){
  var due=itemDue(t), ok=due<=0;
  var res=ok?'<div class="res">已足・免煮</div>':'<div class="resn">'+num(due)+' ml</div>';
  var potRow='<div class="step"><span class="lab">'+(t.hasCup?'壺裝剩量':'目前剩量')+'</span><div class="ctrl"><button onclick="bumpPot(\''+t.id+'\',-1)">−</button><input class="val mono" inputmode="decimal" value="'+fmt1(st.pot[t.id])+'" onchange="setPot(\''+t.id+'\',this.value)" onfocus="this.select()"><button onclick="bumpPot(\''+t.id+'\',1)">+</button><span class="vu">壺</span></div></div>';
  var cupRow=t.hasCup?'<div class="step"><span class="lab">封杯剩量</span><div class="ctrl"><button onclick="bumpCup(\''+t.id+'\',-1)">−</button><input class="val mono" inputmode="numeric" value="'+st.cup[t.id]+'" onchange="setCup(\''+t.id+'\',this.value)" onfocus="this.select()"><button onclick="bumpCup(\''+t.id+'\',1)">+</button><span class="vu">杯</span></div></div>':'';
  var sealNote=(st.ctx==='tomorrow'&&t.hasCup&&sealOv[t.id]>0)?'<div class="ing" style="margin-top:10px"><span class="cup">打烊前先封 <b>'+sealOv[t.id]+'</b> 杯給明早</span></div>':'';
  return '<div class="card '+(ok?'ok':'')+'"><div class="top"><span class="sdot"></span><div><div class="name">'+t.name+'</div><div class="meta">1壺＝'+num(t.potCc)+'ml</div></div><div class="right">'+res+'</div></div>'+potRow+cupRow+sealNote+'</div>';
}

function pageSet(){
  var h='<div class="head"><div class="title"><span class="leaf"></span>設定</div>'+cloudHTML()+'</div>';
  h+='<div class="sub">老闆解鎖後改各茶全日總量(ml)、時段權重、封杯數，存雲端同步</div>';
  if(!st.unlocked){
    var lastG='';
    TEAS.forEach(function(t){ if(t.group!==lastG){ h+='<div class="sect"><span class="dot"></span>'+t.group+'</div>'; lastG=t.group; }
      h+='<div class="srow"><div class="an">'+t.name+'</div><div class="meta" style="font-size:11px;color:var(--ink3);font-family:\'Noto Sans TC\',monospace">平日 '+num(tot[t.id].wk)+' ／ 假日 '+num(tot[t.id].wkd)+' ml　・權重 '+segOv[t.id].join('/')+(t.hasCup?'　・封杯 '+sealOv[t.id]+'杯':'')+'</div></div>'; });
    h+='<div class="lockbox" style="margin-top:14px"><input id="pwIn" type="password" placeholder="輸入老闆密碼以調整" autocomplete="off"><button onclick="unlock()">解鎖</button></div>';
    if(lockMsg) h+='<div class="msg" style="color:var(--danger)">'+lockMsg+'</div>';
  } else {
    var lastG='';
    TEAS.forEach(function(t){ if(t.group!==lastG){ h+='<div class="sect"><span class="dot"></span>'+t.group+'</div>'; lastG=t.group; }
      var g=segOv[t.id];
      var cup=t.hasCup?'<div class="sfield cup"><span class="sl">封杯</span><button onclick="bumpSeal(\''+t.id+'\',-1)">−</button><span class="sv">'+sealOv[t.id]+'</span><button onclick="bumpSeal(\''+t.id+'\',1)">+</button></div>':'';
      h+='<div class="srow"><div class="an">'+t.name+'</div><div class="sfields">'+
        '<div class="sfield"><span class="sl">平日</span><button onclick="bumpTot(\''+t.id+'\',\'wk\',-1)">−</button><span class="sv">'+num(tot[t.id].wk)+'</span><button onclick="bumpTot(\''+t.id+'\',\'wk\',1)">+</button></div>'+
        '<div class="sfield"><span class="sl">假日</span><button onclick="bumpTot(\''+t.id+'\',\'wkd\',-1)">−</button><span class="sv">'+num(tot[t.id].wkd)+'</span><button onclick="bumpTot(\''+t.id+'\',\'wkd\',1)">+</button></div>'+cup+'</div>'+
        '<div class="sfields" style="margin-top:7px">'+
        '<div class="sfield"><span class="sl">早上</span><button onclick="bumpSeg(\''+t.id+'\',0,-1)">−</button><span class="sv">'+g[0]+'</span><button onclick="bumpSeg(\''+t.id+'\',0,1)">+</button></div>'+
        '<div class="sfield"><span class="sl">10–12</span><button onclick="bumpSeg(\''+t.id+'\',1,-1)">−</button><span class="sv">'+g[1]+'</span><button onclick="bumpSeg(\''+t.id+'\',1,1)">+</button></div>'+
        '<div class="sfield"><span class="sl">中午</span><button onclick="bumpSeg(\''+t.id+'\',2,-1)">−</button><span class="sv">'+g[2]+'</span><button onclick="bumpSeg(\''+t.id+'\',2,1)">+</button></div></div></div>'; });
    h+='<button class="bigbtn" onclick="saveConfig()">儲存到雲端</button>';
    if(saveMsg) h+='<div class="msg" style="color:'+(saveOk?'var(--ok)':'var(--danger)')+'">'+saveMsg+'</div>';
  }
  h+='<div class="note">桶子上限 '+num(MAX_BUCKET)+' ml，超過自動分鍋。時段權重只用在「補今天」：今天剩餘＝今日量×(10–12＋中午)比例。配方(每1000ml)：紅茶 茶葉20g/半糖糖71g｜濃茶 茶葉32.5g/半糖糖70g｜奶茶 經典6g/PA20.5g/奶精120g/糖49g。悶醒：紅濃 10/10、奶茶 20/10 分。</div>';
  return h;
}

function render(){
  document.querySelectorAll('#nav button').forEach(function(b){ b.classList.toggle('on', b.dataset.pg===st.page); });
  document.getElementById('content').innerHTML = st.page==='brew'?pageBrew() : st.page==='plan'?pagePlan() : pageSet();
}
document.querySelectorAll('#nav button').forEach(function(b){ b.addEventListener('click',function(){ go(b.dataset.pg); }); });

st.ctx = (new Date().getHours()>=14) ? 'tomorrow' : 'today';
setCtx(st.ctx);
st.page = (new Date().getHours()>=17) ? 'plan' : 'brew';
render(); loadConfig(); loadPlan(true);
</script>
</body>
</html>

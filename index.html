<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>庄腳・煮茶｜JenKa Tea</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#F6F3ED;--card:#FCFAF6;--surface:#FCFAF6;--ink:#2B2824;--ink2:#6B665C;--ink3:#9C978C;--border:#E7E2D8;--tint:#F0ECE3;--neutral:#D8D2C6;--ok:#5F8268;--ok-soft:#E9EFE9;--warn:#B6863C;--warn-soft:#F6EEDD;--danger:#A2503C;--danger-soft:#F3E3DC;--accent:#2E6E64;--accent-soft:#E3EEEB;--navh:58px;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--cream);color:var(--ink);font-family:"Noto Sans TC",sans-serif;-webkit-font-smoothing:antialiased}
.mono{font-family:"Noto Sans TC",sans-serif}
.mono,.htot,.resn,.bvol,.val,.sv,.tm,.hbreak .pot,.card .meta b{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.wrap{max-width:480px;margin:0 auto;padding:14px 20px;padding-top:calc(74px + env(safe-area-inset-top));padding-bottom:calc(var(--navh) + env(safe-area-inset-bottom) + 24px)}
.apphdr{position:fixed;left:0;right:0;top:0;background:rgba(252,250,246,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);z-index:60;padding-top:env(safe-area-inset-top)}
.apphdr-inner{max-width:480px;margin:0 auto;padding:9px 24px;min-height:64px;display:flex;align-items:center;justify-content:space-between;position:relative}
.hdr-logo{height:50px;width:50px;object-fit:contain;border-radius:50%;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
.hdr-side{flex:1;display:flex;align-items:center}
.hdr-side:last-child{justify-content:flex-end}
.apphdr .cloud{margin-left:0}
.head{margin-bottom:6px;display:flex;align-items:center;gap:8px}
.title{font-size:22px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.title .leaf{width:9px;height:9px;border-radius:50%;background:var(--accent)}
.cloud{margin-left:auto;font-size:10.5px;font-weight:600;color:var(--ink3);display:flex;align-items:center;gap:5px}
.cloud .cd{width:7px;height:7px;border-radius:50%;background:var(--neutral)}
.cloud.online .cd{background:var(--ok)} .cloud.offline .cd{background:var(--warn)}
.sub{font-size:12px;color:var(--ink3);margin:2px 0 16px;line-height:1.6}
.lk{color:var(--accent);font-weight:700}
.ctxseg{display:flex;background:var(--tint);border-radius:12px;padding:3px;margin-bottom:12px}
.ctxseg button{flex:1;border:0;background:transparent;color:var(--ink2);font-family:inherit;font-size:13px;font-weight:600;padding:11px 0;border-radius:10px;cursor:pointer;line-height:1.3}
.ctxseg button small{display:block;font-size:10px;font-weight:500;color:var(--ink3);margin-top:2px}
.ctxseg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(43,40,36,.12)} .ctxseg button.on small{color:var(--ink2)}
.ctxseg .wd{color:var(--accent)}
.daybar{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 13px;margin-bottom:14px;box-shadow:0 1px 3px rgba(43,40,36,.06);display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink2)}
.daybar .d{font-weight:600;color:var(--ink)}
.statusbar{display:flex;align-items:center;gap:9px;background:#EBF0EC;border-radius:10px;padding:10px 13px;margin-bottom:14px;font-size:12px;color:var(--ink2)}
.statusbar .sd{width:7px;height:7px;border-radius:50%;background:var(--ok);flex:none}
.statusbar .t{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.statusbar.none{background:var(--tint)}
.statusbar.none .sd{background:#C2BCAE}
.ghosthint{text-align:center;font-size:11px;color:var(--ink3);margin-top:6px;line-height:1.5}
.mini{display:flex;background:var(--tint);border-radius:14px;padding:2px;margin-left:auto}
.mini button{border:0;background:transparent;color:var(--ink3);font-family:inherit;font-size:11px;font-weight:600;padding:5px 11px;border-radius:12px;cursor:pointer}
.mini button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(43,40,36,.12)}
.handover{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:6px 16px 14px;box-shadow:0 1px 3px rgba(43,40,36,.07);margin-bottom:16px}
.handover .label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--ink3);padding:13px 0 4px}
.hrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.hrow:last-of-type{border-bottom:0}
.hrow .hl{min-width:0}
.hrow .htn{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px}
.hrow .htn .cd{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none}
.hrow.off .htn .cd{background:var(--neutral)}
.hrow .hpot{display:flex;align-items:center;gap:9px;margin-top:7px}
.hrow .hpot .pb{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:8px;padding:3px 9px 3px 7px;flex:none;display:inline-flex;align-items:center}
.hrow .hpot .pb .ic{width:13px;height:13px;margin-right:3px;vertical-align:0}
.hrow .hpot .pvol{font-size:15px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.hrow .hpot .pnone{font-size:12.5px;font-weight:600;color:var(--warn);background:var(--warn-soft);border-radius:8px;padding:3px 9px}
.hrow .hpot.single{margin-top:6px}
.hrow .htag{background:var(--accent-soft);border-radius:8px;padding:3px 9px;font-size:12.5px;color:var(--accent);font-weight:600}
.hrow .htot{margin-left:auto;font-family:"Noto Sans TC",monospace;font-size:21px;font-weight:500;color:var(--accent);white-space:nowrap;line-height:1}
.hrow .htot span{font-size:11px;color:var(--ink3);margin-left:3px}
.hrow.off .htot{color:var(--ink3);font-size:14px;font-weight:600}
.handover .copy{margin-top:13px;width:100%;background:var(--ink);border:0;color:#fff;font-family:inherit;font-size:13px;font-weight:600;padding:11px 0;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.sect{font-size:11px;font-weight:700;letter-spacing:1.4px;color:var(--ink3);margin:18px 2px 9px;display:flex;align-items:center;gap:7px}
.sect .dot{width:7px;height:7px;border-radius:50%;background:var(--neutral)}
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px 15px;box-shadow:0 1px 3px rgba(43,40,36,.07);margin-bottom:9px}
.card .top{display:flex;align-items:flex-start;gap:10px}
.card .sdot{width:9px;height:9px;border-radius:50%;background:var(--neutral);margin-top:5px;flex:none}
.card.ok .sdot{background:var(--ok)}
.card .name{font-size:15px;font-weight:600} .card .meta{font-size:11px;color:var(--ink3);margin-top:3px} .card .meta b{color:var(--ink2);font-family:"Noto Sans TC",monospace;font-weight:500}
.card .right{margin-left:auto;text-align:right;flex:none;padding-left:8px}
.card .res{font-size:11px;color:var(--ink3);font-weight:600} .card.ok .res{color:var(--ok)}
.card .resn{font-family:"Noto Sans TC",sans-serif;font-size:17px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;white-space:nowrap}
.card .resn small{font-size:11px;color:var(--ink3);font-weight:500;margin-left:1px}
.card .resn.ok{color:var(--ok)}
.card .resn.short{color:var(--danger)}
.card .right .chk{display:inline-flex;width:20px;height:20px;border-radius:50%;background:var(--ok);align-items:center;justify-content:center}
.card .right .chk i{width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-1px;display:block}
.card .right .diff{font-size:14px;font-weight:600;color:var(--ink2);font-variant-numeric:tabular-nums;white-space:nowrap}
.seala{margin-top:11px;font-size:11.5px;color:var(--ink3);display:flex;align-items:center;gap:6px}
.seala .ic{width:13px;height:13px;flex:none;opacity:.8;margin-right:0}
.seala b{color:var(--ink2);font-weight:600;font-variant-numeric:tabular-nums}
.card .ing{display:flex;flex-wrap:wrap;gap:6px}
.card .ing span.cup{background:var(--accent-soft);color:var(--accent);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600} .card .ing span.cup b{font-family:"Noto Sans TC",monospace;color:var(--accent);font-weight:500}
.steprow{display:flex;align-items:center;justify-content:flex-start;gap:36px;margin-top:15px;padding-left:2px}
.sgrp{display:flex;align-items:center;gap:11px}
.sgrp .slab{font-size:13px;color:var(--ink2);font-weight:600}
.ctrl{display:inline-flex;align-items:center;gap:9px}
.ctrl button{width:32px;height:32px;border:0;border-radius:50%;background:var(--tint);color:var(--ink2);font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.ctrl button:active{background:var(--neutral)}
.ctrl .val{width:42px;text-align:center;font-family:"Noto Sans TC",sans-serif;font-size:17px;font-weight:600;color:var(--ink);border:0;background:transparent;padding:4px 0;font-variant-numeric:tabular-nums}
.ctrl .val:focus{outline:0;box-shadow:inset 0 -2px 0 var(--accent)}
.haverow{display:flex;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.haverow .hl{font-size:13px;font-weight:600;color:var(--ink)}
.haverow .hv{margin-left:auto;font-size:16px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.haverow .hv small{font-size:11px;color:var(--ink3);font-weight:500;margin-left:1px}
.pstat{font-size:12.5px;font-weight:700;border-radius:9px;padding:4px 11px;white-space:nowrap}
.pstat.ok{color:var(--ok);background:var(--ok-soft)}
.pstat.short{color:var(--danger);background:var(--danger-soft)}
.ptarget{font-size:12px;color:var(--ink3);margin-top:3px}
.ptotal{margin-top:13px;padding-top:12px;border-top:1px solid var(--border)}
.ptl{display:flex;align-items:baseline}
.ptl span{font-size:13px;color:var(--ink2);font-weight:600}
.ptl b{margin-left:auto;font-size:20px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.ptl b small{font-size:12px;color:var(--ink3);font-weight:500;margin-left:2px}
.pbar{height:7px;background:var(--tint);border-radius:4px;margin-top:9px;overflow:hidden}
.pbar i{display:block;height:100%;border-radius:4px;background:var(--accent);transition:width .15s}
.pbar i.ok{background:var(--ok)}
.pbd{margin-top:11px;font-size:12px;color:var(--ink2);background:var(--tint);border-radius:8px;padding:8px 11px;font-variant-numeric:tabular-nums;line-height:1.5}
.pbd b{color:var(--accent);font-weight:700}
.pbar i.short{background:var(--danger)}
/* 煮茶大卡（每鍋一張） */
.brew{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 16px;box-shadow:0 1px 3px rgba(43,40,36,.07);margin-bottom:11px}
.brew .bh{display:flex;align-items:baseline;gap:8px}
.brew .bname{font-size:17px;font-weight:700}
.brew .bpot{font-size:11px;color:var(--accent);background:var(--accent-soft);border-radius:9px;padding:2px 8px 2px 6px;font-weight:600;display:inline-flex;align-items:center}
.brew .bpot .ic{width:13px;height:13px;margin-right:3px;vertical-align:0}
.brew .bvol{margin-left:auto;font-family:"Noto Sans TC",monospace;font-size:22px;font-weight:500;color:var(--accent)} .brew .bvol small{font-size:12px;color:var(--ink3)}
.brew .bsplit{font-size:14px;color:var(--ink);font-weight:600;margin-top:9px}
.brew .bsplit .sn{color:var(--warn);font-weight:700} .brew .bsplit .sh{color:var(--accent);font-weight:700}
.edtoggle{display:inline-flex;align-items:center;gap:6px;margin:0 0 12px;background:var(--surface);border:1px solid var(--border);color:var(--ink2);font-family:inherit;font-size:13px;font-weight:600;padding:9px 14px;border-radius:11px;cursor:pointer}
.edtoggle .ic{width:16px;height:16px}
.edpanel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:6px 15px 15px;box-shadow:0 1px 3px rgba(43,40,36,.07);margin-bottom:14px}
.edpanel .edhead{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:1.2px;color:var(--ink3);padding:12px 0 3px}
.edpanel .edhead .ic{width:15px;height:15px}
.edpanel .edhint{font-size:11px;color:var(--ink3);margin:0 0 6px;line-height:1.5}
.edrow{display:flex;align-items:center;padding:9px 0;border-top:1px solid var(--border)}
.edrow .ednm{font-size:14px;font-weight:600;color:var(--ink)}
.edctrl{display:inline-flex;align-items:center;gap:8px;margin-left:auto}
.edctrl button{width:30px;height:30px;border:0;border-radius:50%;background:var(--tint);color:var(--ink2);font-size:17px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.edctrl button:active{background:var(--neutral)}
.edctrl .edval{width:62px;text-align:center;font-family:"Noto Sans TC",sans-serif;font-size:16px;font-weight:600;color:var(--ink);border:0;border-bottom:1.5px solid var(--border);background:transparent;padding:3px 0;font-variant-numeric:tabular-nums}
.edctrl .edval:focus{outline:0;border-bottom-color:var(--accent)}
.edctrl .edu{font-size:11px;color:var(--ink3);margin-left:-3px}
.edwho{padding:11px 0 2px;border-top:1px solid var(--border);margin-top:2px}
.edwho .wl{font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:8px}
.edwho .wl b{color:var(--danger);font-weight:600;margin-left:4px}
.whochips{display:flex;flex-wrap:wrap;gap:7px}
.whochips button{border:1px solid var(--border);background:var(--surface);color:var(--ink2);font-family:inherit;font-size:13px;font-weight:600;padding:7px 16px;border-radius:20px;cursor:pointer}
.whochips button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.copybrew{margin-top:10px;width:100%;background:var(--surface);border:1px solid var(--border);color:var(--ink);font-family:inherit;font-size:13px;font-weight:600;padding:12px 0;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.lpush{margin-top:9px;width:100%;background:#06C755;border:0;color:#fff;font-family:inherit;font-size:13px;font-weight:600;padding:12px 0;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.lpush:active{background:#05b34c}
.lpush .ic{width:16px;height:16px}
.tagchg{font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-soft);border-radius:6px;padding:1px 6px;margin-left:7px;vertical-align:2px}
.brew .recipe{margin-top:12px;border:1px solid var(--border);border-radius:11px;overflow:hidden}
.brew .rr{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface)}
.brew .rr + .rr{border-top:1px solid var(--border)}
.brew .rr .rv{font-size:12px;font-weight:600;color:var(--ink2);background:var(--tint);border-radius:7px;padding:3px 8px;flex:none;font-variant-numeric:tabular-nums}
.brew .rr .rv.sugar{background:var(--warn-soft);color:var(--warn)}
.brew .rr .rn{font-size:13.5px;font-weight:600;color:var(--ink);display:inline-flex;align-items:center}
.brew .rr .rn .ic{color:var(--ink2)}
.brew .rr .rg{margin-left:auto;font-size:18px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums} .brew .rr .rg small{font-size:12px;color:var(--ink3);font-weight:500;margin-left:1px}
.brew .rr .rg.sugar{color:var(--warn)}
.ic{width:15px;height:15px;flex:none;vertical-align:-2px;margin-right:5px}
.roundseg{display:flex;background:var(--tint);border-radius:12px;padding:3px;margin-bottom:7px}
.roundseg button{flex:1;border:0;background:transparent;color:var(--ink2);font-family:inherit;font-size:14px;font-weight:600;padding:10px 0;border-radius:10px;cursor:pointer;line-height:1.25}
.roundseg button small{display:block;font-size:10.5px;font-weight:500;color:var(--ink3);margin-top:2px}
.roundseg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(43,40,36,.12)} .roundseg button.on small{color:var(--accent)}
.roundhint{font-size:11.5px;color:var(--ink3);margin:0 2px 13px;display:flex;align-items:center}
.roundhint .ic{color:var(--accent)}
.brew .timers{display:flex;gap:10px;margin-top:13px;padding-top:13px;border-top:1px solid var(--border)}
.phase{flex:1;display:flex;flex-direction:column;gap:7px}
.pbtn{display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--border);background:var(--surface);color:var(--ink);font-family:inherit;font-size:14px;font-weight:600;padding:11px 0;border-radius:10px;cursor:pointer}
.pbtn.done{background:var(--ok-soft);border-color:#CFE0CF;color:var(--ok)}
.ck{width:18px;height:18px;border:1.6px solid var(--ink3);border-radius:5px;display:inline-flex;align-items:center;justify-content:center;flex:none;box-sizing:border-box}
.pbtn.done .ck{border-color:var(--ok);background:var(--ok)}
.ck i{width:4px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px;display:block}
.tmbtn{border:1px solid var(--border);background:var(--surface);color:var(--ink2);font-family:inherit;font-size:13px;font-weight:600;padding:9px 0;border-radius:9px;cursor:pointer}
.tmbtn.run{background:var(--accent);color:#fff;border-color:var(--accent)}
.tmbtn.run.rest{background:var(--warn);border-color:var(--warn)}
.tmbtn .tm{font-variant-numeric:tabular-nums;font-size:15px}
.bigbtn{width:100%;margin-top:18px;background:var(--ink);border:0;color:#fff;font-family:inherit;font-size:15px;font-weight:600;padding:15px 0;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.ghost{width:100%;margin-top:10px;background:var(--surface);border:1px solid var(--border);color:var(--ink2);font-family:inherit;font-size:13px;font-weight:600;padding:12px 0;border-radius:11px;cursor:pointer}
.msg{font-size:12px;font-weight:600;text-align:center;margin-top:10px}
.empty{text-align:center;color:var(--ink3);font-size:13px;line-height:1.7;padding:30px 10px}
.lockbox{display:flex;gap:8px;margin:6px 0 4px}
.lockbox input{flex:1;border:1px solid var(--border);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:13px;background:var(--surface)} .lockbox input:focus{outline:0;border-color:var(--accent)}
.lockbox button{border:0;background:var(--ink);color:#fff;font-family:inherit;font-size:13px;font-weight:600;padding:0 16px;border-radius:9px;cursor:pointer}
.srow{padding:11px 0;border-bottom:1px solid var(--border)} .srow:last-of-type{border-bottom:0}
.srow .an{font-size:13px;font-weight:600;margin-bottom:7px}
.sfields{display:flex;flex-wrap:wrap;gap:7px}
.sfield{display:flex;align-items:center;gap:5px;background:var(--tint);border-radius:9px;padding:4px 7px}
.sfield .sl{font-size:10.5px;color:var(--ink3);font-weight:600} .sfield.cup .sl{color:var(--accent)}
.sfield button{width:24px;height:24px;border-radius:7px;border:1px solid var(--border);background:#fff;color:var(--ink);font-size:14px;cursor:pointer}
.sfield .sv{min-width:34px;text-align:center;font-family:"Noto Sans TC",monospace;font-size:12px;font-weight:500}
.note{font-size:11px;color:var(--ink3);line-height:1.7;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.nav{position:fixed;left:0;right:0;bottom:0;height:calc(var(--navh) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(252,250,246,.96);backdrop-filter:blur(8px);border-top:1px solid var(--border);display:flex;z-index:50}
.nav button{flex:1;border:0;background:transparent;font-family:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--ink3);font-size:11px;font-weight:600}
.nav button .ni{width:20px;height:20px;border-radius:6px;border:2px solid currentColor;opacity:.55}
.nav button.on{color:var(--accent)} .nav button.on .ni{opacity:1;background:var(--accent-soft)}
/* 即時盤點：缺貨預警（小提示，不搶眼） */
.cupwarn{margin-top:11px;display:flex;align-items:center;gap:7px;font-size:12.5px;flex-wrap:wrap;line-height:1.4}
.cupwarn .ccup{font-weight:700;color:var(--ink)} .cupwarn .ccup b{color:var(--ink);font-variant-numeric:tabular-nums}
.cupwarn .est{font-size:11px;color:var(--ink3);font-weight:600}
.cupwarn .sep{color:var(--ink3);font-size:11px}
.cupwarn .cdot{width:7px;height:7px;border-radius:50%;flex:none;background:var(--neutral)}
.cupwarn .ctag{font-size:11.5px;font-weight:600;color:var(--ink3)}
.cupwarn.low .cdot{background:var(--warn)} .cupwarn.low .ctag{color:var(--warn);font-weight:700}
.cupwarn.out .cdot{background:var(--danger)} .cupwarn.out .ctag{color:var(--danger);font-weight:700}

function dayTotal(t){ return totFor(t.id, st.wd); }

function toMin(s){ var p=String(s).split(':'); return (+p[0])*60+(+p[1]); }
function schedFor(wd){ return (SCHED[wd]&&SCHED[wd].length)?SCHED[wd]:defSeg(); }
function bizHoursText(){ var s=schedFor(new Date().getDay()); return s.length?(s[0].s+'–'+s[s.length-1].e):'未設定'; }
/* 依現在時鐘算「今天還沒賣掉的比例」：整段未到計全權重、進行中按剩餘時間比例、已過歸零 */
function remainRatioNow(){
  var d=new Date(), wd=d.getDay(), segs=schedFor(wd), now=d.getHours()*60+d.getMinutes();
  var totalW=0, remW=0;
  segs.forEach(function(s){ var a=toMin(s.s), b=toMin(s.e), w=+s.w||0; if(b<=a)return; totalW+=w;
    if(now<=a) remW+=w; else if(now>=b){} else remW+=w*((b-now)/(b-a)); });
  return totalW>0?remW/totalW:0;
}
function itemDue(t){
  var total=dayTotal(t), have=remainMl(t), due;
  if(st.ctx==='tomorrow'){ due = totFor(t.id, dateInfo(1).wi) + totFor(t.id, dateInfo(2).wi) - have; }   /* 明日(賣)基本量 ＋ 後天(賣)基本量 − 現有 */
  else {                                                     /* 即時補煮：今天剩需 ＋ 明天基本量 − 現有 */
    var ratio=remainRatioNow();
    var tomB = totFor(t.id, dateInfo(1).wi);                 /* 明天基本量：一律計入（給明天開店用） */
    due = total*ratio + tomB - have;
  }
  if(due<0)due=0;
  return Math.round(due/CUP_ML)*CUP_ML;
}
function buckets(total){ var out=[]; while(total>0){ var b=Math.min(total,MAX_BUCKET); out.push(b); total-=b; } return out; }

/* 把一種茶的該煮量拆成鍋（含無糖/半糖分配，無糖優先放前面的鍋） */
function brewBatches(b, amt){
  var none=b.none?(amt[b.none]||0):0, half=b.half?(amt[b.half]||0):0, single=b.single?(amt[b.single]||0):0;
  var total=b.single?single:(half+none);
  if(total<=0) return [];
  var bs=buckets(total), rem=none, out=[];
  bs.forEach(function(v,i){
    var bn=b.single?0:Math.min(rem,v); rem-=bn; var bh=v-bn;
    var ing=b.ing.map(function(x){ return {n:x.n, g:Math.round(v/1000*x.per1000)}; });
    var sugarBase=b.single?v:bh;
    out.push({idx:i, vol:v, none:bn, half:bh, ing:ing, sugarG:Math.round(sugarBase/1000*b.sugarPer1000), single:b.single, n:bs.length});
  });
  return out;
}
function handoverData(b, amt){
  var none=b.none?(amt[b.none]||0):0, half=b.half?(amt[b.half]||0):0, single=b.single?(amt[b.single]||0):0;
  var total=b.single?single:(half+none);
  if(total<=0) return {name:b.name, off:true};
  var bs=buckets(total), rem=none, batches=[];
  bs.forEach(function(v){ var bn=Math.min(rem,v); rem-=bn; batches.push({vol:v, none:bn}); });
  return {name:b.name, off:false, total:total, none:none, batches:batches};
}
function handoverText(b, amt){

function ding(freq,len){ var a=actx; if(!a)return; var t=a.currentTime; var o=a.createOscillator(),g=a.createGain(); o.connect(g); g.connect(a.destination); o.type='sine'; o.frequency.setValueAtTime(freq||1000,t); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.6,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+(len||0.18)); o.start(t); o.stop(t+(len||0.18)+0.02); }

function tnAt(start,freq,dur,type,peak){ var a=actx; if(!a)return; var o=a.createOscillator(),g=a.createGain(); o.type=type||'sine'; o.frequency.setValueAtTime(freq,start); o.connect(g); g.connect(a.destination); g.gain.setValueAtTime(0.0001,start); g.gain.exponentialRampToValueAtTime(peak||0.45,start+0.008); g.gain.exponentialRampToValueAtTime(0.0001,start+dur); o.start(start); o.stop(start+dur+0.03); }

  var wdToday=(plans.today&&plans.today.dwd)?'<span class="wd">週'+plans.today.dwd+'</span> ':''; /* 補煮日星期 */
  var subNext=showNext?(plans.next.dlabel+'・今天煮明天賣'):'尚未更新資料';
  var subToday=hasToday?(plans.today.dlabel+'・當天現賣'):'尚未更新資料';

  var kind=st.brewKind, p=plans[kind];
  var hidden=(kind==='next'&&isStaleNext());   /* 選到已收起的開班，內容也顯示尚未更新 */
  if(!p || !p.plan || hidden){
    h+='<div class="sub">'+t0.m+'/'+t0.day+'（週'+t0.wd+'）</div>';
    h+='<div class="empty">'+(hidden?'「下班盤點」的開班資料已過今日（13:00 後自動收起）。<br>當晚做下班盤點送出後，這裡會重新出現明天的量。':'「'+(kind==='next'?'下班盤點':'即時盤點')+'」目前沒有資料。<br>請到「茶量」選同一個、盤點後送出，這裡才會出現要煮的量。')+'<br><br><button class="ghost" onclick="loadPlans(false)">重新讀取雲端</button></div>';
    return h;
  }

  var forDay = (kind==='today') ? '今天現賣（即時補煮）' : (fmtDkeyMinus(ndk,1)+' 煮 → '+fmtDkeyMinus(ndk,0)+' 賣（冰鎮）');
  h+='<div class="sub">'+t0.m+'/'+t0.day+'（週'+t0.wd+'）　・'+forDay+'　・'+hhmm(p.at)+' 送出'+(p.editBy?'　・'+p.editBy+' '+hhmm(p.editAt||p.at)+' 調整':'')+'</div>';
  var editing=(st.editKind===kind);
  var src=editing?st.editVals:p.plan;
  h+=editPanelHTML(kind,p,editing);
  if(planMsg) h+='<div class="msg" style="color:'+(planMsg.indexOf('✕')>=0||planMsg.indexOf('失敗')>=0?'var(--danger)':'var(--ok)')+';margin-bottom:8px">'+planMsg+'</div>';
  var perBase=[];
  BASES.forEach(function(b){ var bs=brewBatches(b, src); if(bs.length) perBase.push({b:b, batches:bs}); });
  if(perBase.length===0){ h+='<div class="empty">這次不需煮茶（量都已足）。</div>'; return h; }
  var maxR=0; perBase.forEach(function(x){ if(x.batches.length>maxR)maxR=x.batches.length; });
  if(st.round>=maxR) st.round=0;
  if(maxR>1){
    h+='<div class="roundseg">';
    for(var r=0;r<maxR;r++){ var cnt=perBase.filter(function(x){return x.batches[r];}).length;
      h+='<button class="'+(st.round===r?'on':'')+'" onclick="setRound('+r+')">第 '+(r+1)+' 鍋<small>'+cnt+' 種</small></button>'; }
    h+='</div><div class="roundhint">'+IC.bucket+'先把「第 1 鍋」煮完，再切到下一鍋回頭煮。</div>';
  }
  var shown=0;
  perBase.forEach(function(x){ var bt=x.batches[st.round]; if(bt){ h+=brewCard(kind, x.b, bt, baseChanged(x.b,kind)); shown++; } });
  if(shown===0) h+='<div class="empty">這一鍋沒有要煮的。</div>';
  h+='<button class="copybrew" onclick="copyBrew()">⧉ 複製最新煮茶量</button>';
  h+='<button class="lpush" onclick="pushLine(\'brew\')">'+IC.line+'推播到 LINE 群組</button>';
  return h;
}
function brewMessage(){
  var kind=st.brewKind, p=plans[kind]; if(!p||!p.plan) return '';

  var cookDk=(kind==='next')?dkMinus(ndk,1):dkMinus(ndk,0);   /* 煮茶日：開班=賣前一天、補煮=當天 */
  var cd=new Date(cookDk[0],cookDk[1]-1,cookDk[2]);
  var head='▌ '+(kind==='next'?'開班煮茶':'即時補煮')+'_'+(cd.getMonth()+1)+'/'+cd.getDate()+' ('+WD_LABEL[cd.getDay()]+')';
  var out=[head];
  BASES.forEach(function(b){ out.push(handoverText(b,src)); });
  var who=(st.editKind===kind)?st.editWho:(p.editBy||'');
  var whenTs=(st.editKind===kind)?Date.now():(p.editAt||p.at);

}

/* 推播到 LINE 群組：先跳確認，確認後經 GAS 代發。GAS 無 CORS，用 no-cors 送出（送得出但讀不到回應），不丟錯即視為已送出 */
function pushLine(kind){
  var txt=(kind==='handover')?handoverMessage():brewMessage();

  var name=(kind==='handover')?'下班盤點交接訊息':'最新煮茶量';
  if(!confirm('確定要把「'+name+'」推播到 LINE 群組嗎？\n\n'+txt)) return;
  planMsg='推播中…'; render();
  var body='secret='+encodeURIComponent(LINE_SECRET)+'&text='+encodeURIComponent(txt);
  fetch(LINE_GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body})
  .then(function(){ planMsg='✓ 已推播到 LINE 群組'; render(); })
  .catch(function(){ planMsg='✕ 推播失敗（請檢查網路）'; render(); });
}

function phaseCtl(card,phase,mins,label){

function teaLabel(t){ return t.name+' <span class="sg sg-'+t.sugar+'">'+(t.sugar==='half'?'半糖':'無糖')+'</span>'; }
function planCard(t){
  var isT=(st.ctx==='tomorrow');
  var total=dayTotal(t), have=remainMl(t);
  var ratio=remainRatioNow();
  var todayNeed=Math.round(total*ratio);                      /* 今天剩需（時段比例） */
  var tomB=isT?0:totFor(t.id, dateInfo(1).wi);                /* 明天基本量（即時：一律計入） */
  var base=isT?totFor(t.id, dateInfo(1).wi):(todayNeed+tomB); /* 下班盤點＝比明日(週二)基本量；即時＝今天剩需＋明天基本量 */
  var pct=base>0?Math.min(100,Math.round(have/base*100)):100;
  var enough=have>=base;
  var status=enough?'<span class="chk"><i></i></span>':'<span class="diff">差 '+num(base-have)+'</span>';
  var sub=isT
    ? ''
    : '<div class="ptarget">今天剩需 '+num(todayNeed)+' ／ 明天基本量 '+num(tomB)+' ml</div>';
  var potGrp='<div class="sgrp"><span class="slab">壺</span><div class="ctrl"><button onclick="bumpPot(\''+t.id+'\',-1)">−</button><input class="val mono" inputmode="decimal" value="'+fmt1(st.pot[t.id])+'" onchange="setPot(\''+t.id+'\',this.value)" onfocus="this.select()"><button onclick="bumpPot(\''+t.id+'\',1)">+</button></div></div>';
  var cupGrp=t.hasCup?'<div class="sgrp"><span class="slab">杯</span><div class="ctrl"><button onclick="bumpCup(\''+t.id+'\',-1)">−</button><input class="val mono" inputmode="numeric" value="'+st.cup[t.id]+'" onchange="setCup(\''+t.id+'\',this.value)" onfocus="this.select()"><button onclick="bumpCup(\''+t.id+'\',1)">+</button></div></div>':'';
  var stepRow='<div class="steprow">'+potGrp+cupGrp+'</div>';
  var haveRow='<div class="haverow"><span class="hl">現有 / '+(isT?'基本量':'目標')+'</span><span class="hv">'+num(have)+' / '+num(base)+'<small> ml</small></span></div>';
  var bar='<div class="pbar"><i class="'+(enough?'ok':'')+'" style="width:'+pct+'%"></i></div>';
  var sealNote=(isT&&t.hasCup&&sealOv[t.id]>0)?'<div class="seala">'+IC.cup+'打烊前封 <b>'+sealOv[t.id]+'</b> 杯給明早</div>':'';
  /* 即時盤點：缺貨預警（可賣杯數＋分級小提示） */
  var cupWarn='';
  if(!isT){
    var cupMl=t.cupMl||CUP_ML, avail=Math.floor(have/cupMl);
    var enoughToday=have>=todayNeed;                          /* 預警只看今天剩需，不含明天 */
    var gapCups=Math.max(0,Math.ceil((todayNeed-have)/cupMl));
    var lvl = enoughToday ? 'ok' : ((have < todayNeed*0.25 || avail<=2) ? 'out' : 'low');
    var est=(cupMl===STRONG_CUP_ML)?'<span class="est">鮮奶茶概估</span>':'';
    var tag = lvl==='ok' ? '' :
              (lvl==='low' ? '<span class="cdot"></span><span class="ctag">可能不夠，建議補 '+gapCups+' 杯</span>'
                           : '<span class="cdot"></span><span class="ctag">快見底</span>');
    cupWarn='<div class="cupwarn '+(lvl==='ok'?'':lvl)+'"><span class="ccup">可賣約 <b>'+avail+'</b> 杯</span>'+est+(tag?'<span class="sep">·</span>'+tag:'')+'</div>';
  }
  return '<div class="card"><div class="top"><span class="sdot"></span><div><div class="name">'+teaLabel(t)+'</div>'+sub+'</div><div class="right">'+status+'</div></div>'+stepRow+haveRow+bar+cupWarn+sealNote+'</div>';
}

  var h='<div class="sect"><span class="dot"></span>營業時段與權重 · 即時盤點預估</div>';
  schedFor(wd).forEach(function(s,i){
    h+='<div class="segrow">'+
      '<input type="time" value="'+s.s+'" onchange="setSegTime('+wd+','+i+',\'s\',this.value)">'+
      '<span class="dash">–</span>'+
      '<input type="time" value="'+s.e+'" onchange="setSegTime('+wd+','+i+',\'e\',this.value)">'+
      '<div class="segw"><span class="sl">權重</span><button onclick="bumpSegW('+wd+','+i+',-1)">−</button><span class="sv">'+s.w+'</span><button onclick="bumpSegW('+wd+','+i+',1)">+</button></div>'+
      '<button class="segdel" onclick="removeSeg('+wd+','+i+')">刪</button>'+
    '</div>';
  });
  h+='<button class="segadd" onclick="addSeg('+wd+')">＋ 新增時段</button>';
  h+='<div class="schedapply"><button onclick="applyWeekdays()">套用到平日（一～五）</button><button onclick="applyWeekend()">套用到假日（六日）</button></div>';
  return h;
}
function plainTea(t){ return t.name+(t.sugar==='half'?' 半糖':' 無糖'); }
function tcellHTML(id,key,last){ var base=tierVal(id,'wk'), v=tierVal(id,key); var cls='hcv'+last, txt=num(v); if(key!=='wk'){ if(v===base){ cls+=' same'; txt='同'; } else { cls+=' diff'; } } return '<div class="'+cls+'">'+txt+'</div>'; }
function homeTeaCard(editable){
  var ed=editable?'<span class="ed" onclick="setView(\'base\')">編輯 ›</span>':'';
  var h='<div class="teacard"><div class="tchead"><span class="tIco">茶</span><span class="tt">各茶基本量</span>'+ed+'</div>';
  h+='<div class="htg"><div class="hcolh l">　</div><div class="hcolh">平日</div><div class="hcolh">平假日</div><div class="hcolh">假日</div>';
  TEAS.forEach(function(t,i){ var last=(i===TEAS.length-1)?' hlast':'';
    h+='<div class="hnm'+last+'">'+teaLabel(t)+'</div>'+tcellHTML(t.id,'wk',last)+tcellHTML(t.id,'ph',last)+tcellHTML(t.id,'hol',last); });
  h+='</div><div class="foot">「同」＝跟平日相同。平日＝週二～五、平假日＝週一、假日＝週六日。</div></div>';
  return h;
}
function specialSummary(){ var ph=TEAS.some(function(t){return tierVal(t.id,'ph')!==tierVal(t.id,'wk');}); var ho=TEAS.some(function(t){return tierVal(t.id,'hol')!==tierVal(t.id,'wk');}); var a=[]; if(ph)a.push('平假日'); if(ho)a.push('假日'); return a.length?(a.join('、')+'與平日不同'):'目前都與平日相同'; }
function sealSummary(){ var a=[]; TEAS.forEach(function(t){ if(t.hasCup&&sealOv[t.id]>0) a.push(plainTea(t)+' '+sealOv[t.id]+'杯'); }); return a.join(' ・ ')||'未設'; }
function entriesHTML(editable){
  function row(ic,t1,t2,view){ var clk=editable?(' onclick="setView(\''+view+'\')"'):''; var ch=editable?'<span class="mch">›</span>':''; return '<div class="mrow"'+clk+'><div class="mic">'+ic+'</div><div class="mtx"><div class="mt1">'+t1+'</div><div class="mt2">'+t2+'</div></div>'+ch+'</div>'; }
  return row('特','特別日調整',specialSummary(),'special')+row('時','營業時段與權重','平日 '+segText(2),'seg')+row('封','封杯提醒',sealSummary(),'seal');
}
function backHTML(){ return '<div class="back" onclick="setView(\'home\')">‹ 返回設定</div>'; }
function subBaseHTML(){ var h=backHTML()+'<div class="subt">各茶基本量</div><div class="subd">每支茶平常一天的量（平日＝週二～五）。點數字可直接打，或用 −＋。</div>'; TEAS.forEach(function(t){ h+='<div class="erow2"><span class="nm">'+teaLabel(t)+'</span>'+stepHTML(t.id,'wk')+'</div>'; }); return h; }
function tierBlock(key,title){ var h='<div class="spcard"><div class="sphead">'+title+'</div>'; TEAS.forEach(function(t){ var base=tierVal(t.id,'wk'), v=tierVal(t.id,key), same=(v===base); h+='<div class="sprow"><div class="snm"><span class="snmn">'+teaLabel(t)+'</span><span class="base">'+(same?'同平日':'平日 '+num(base))+'</span></div>'+stepHTML(t.id,key)+'</div>'; }); return h+'</div>'; }
function subSpecialHTML(){ return backHTML()+'<div class="subt">特別日調整</div><div class="subd">這些日子的茶量跟平日不同；其餘日子用平日。跟平日相同會顯示灰字。</div>'+tierBlock('ph','平假日（週一）')+tierBlock('hol','假日（週六、日）'); }
function subSegHTML(){ return backHTML()+'<div class="subt">營業時段與權重</div><div class="subd">選一天，編輯該日的時段與權重（即時盤點預估用）。</div>'+dayTabsHTML()+schedEditorHTML(); }
function subSealHTML(){ var h=backHTML()+'<div class="subt">封杯提醒</div><div class="sealnote">下班前習慣先封好一定杯數給隔天用。盤點時這些封杯用「杯」欄數、已併入現有總量；這裡只設「要封幾杯」的提醒，不影響計算。會顯示在茶量頁下班盤點：「打烊前封 N 杯給明早」。</div>'; TEAS.forEach(function(t){ if(!t.hasCup)return; h+='<div class="sprow"><div class="snm"><span class="snmn">'+teaLabel(t)+'</span></div><div class="stp"><button onclick="bumpSeal(\''+t.id+'\',-1)">−</button><span class="sealv">'+sealOv[t.id]+' 杯</span><button onclick="bumpSeal(\''+t.id+'\',1)">＋</button></div></div>'; }); return h; }
function noteHTML(){ return '<div class="note">桶子上限 '+num(MAX_BUCKET)+' ml，超過自動分鍋。「即時盤點」依現在時鐘＋各日時段權重推估今天還要賣多少（整段未到計全權重、進行中按剩餘時間比例、已過歸零）。可賣杯數：紅茶／奶茶 ÷'+CUP_ML+'ml、濃茶以鮮奶茶 ÷'+STRONG_CUP_ML+'ml 概估。配方(每1000ml)：紅茶 茶葉20g/半糖糖71g｜濃茶 茶葉32.5g/半糖糖70g｜奶茶 經典6g/PA20.5g/奶精120g/糖49g。悶醒：紅濃 10/10、奶茶 20/10 分。</div>'; }
function pageSet(){
  var h='<div class="head"><div class="title">設定</div></div>';
  if(!st.unlocked){
    h+='<div class="sub">老闆解鎖後可調整茶量、特別日、營業時段、封杯</div>';
    h+=homeTeaCard(false)+entriesHTML(false);
    h+='<div class="lockbox" style="margin-top:14px"><input id="pwIn" type="password" placeholder="輸入老闆密碼以調整" autocomplete="off"><button onclick="unlock()">解鎖</button></div>';
    if(lockMsg) h+='<div class="msg" style="color:var(--danger)">'+lockMsg+'</div>';
    return h+noteHTML();
  }
  var v=st.setView;
  if(v==='base') h+=subBaseHTML();
  else if(v==='special') h+=subSpecialHTML();
  else if(v==='seg') h+=subSegHTML();
  else if(v==='seal') h+=subSealHTML();
  else { h+='<div class="sub">點卡片或項目進入編輯</div>'+homeTeaCard(true)+entriesHTML(true); }
  if(v!=='home'){ h+='<button class="bigbtn" onclick="saveConfig()">儲存到雲端</button>'; if(saveMsg) h+='<div class="msg" style="color:'+(saveOk?'var(--ok)':'var(--danger)')+'">'+saveMsg+'</div>'; }
  return h+noteHTML();
}

function render(){
  document.querySelectorAll('#nav button').forEach(function(b){ b.classList.toggle('on', b.dataset.pg===st.page); });
  var hc=document.getElementById('hdrCloud'); if(hc) hc.innerHTML=cloudHTML();
  document.getElementById('content').innerHTML = st.page==='brew'?pageBrew() : st.page==='plan'?pagePlan() : st.page==='hist'?pageHist() : pageSet();
}
document.querySelectorAll('#nav button').forEach(function(b){ b.addEventListener('click',function(){ go(b.dataset.pg); }); });

setCtx('tomorrow');
st.page = (new Date().getHours()>=17) ? 'plan' : 'brew';
setCtx(st.ctx); loadConfig(); loadPlans(true);
</script>
</body>
</html>
